<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Receipt paper background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#FAFAF7" filter="url(#paper-shadow)"/>
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F0EDE0" opacity="0.12"/>

  <!-- Header strip - yellow/amber for cab -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#1C1C1C"/>
  <rect x="20" y="50" width="360" height="32" fill="#1C1C1C"/>

  <!-- Uber-style "U" logo circle -->
  <circle cx="52" cy="40" r="18" fill="#000000" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="52" y="45" font-family="'Arial', sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">U</text>

  <!-- Header text -->
  <text x="82" y="32" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">CAB RECEIPT</text>
  <text x="82" y="48" font-family="'Arial', sans-serif" font-size="10" fill="#F59E0B" letter-spacing="1">UBER — TRIP SUMMARY</text>
  <text x="200" y="73" font-family="'Arial', sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle" letter-spacing="1">Thank you for riding with Uber</text>

  <line x1="30" y1="97" x2="370" y2="97" stroke="#E5E0D4" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Trip reference -->
  <text x="40" y="116" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">TRIP ID</text>
  <text x="40" y="130" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#2C2A27">UBR-20250315-9F4C2E</text>
  <text x="360" y="116" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end" letter-spacing="1">DATE</text>
  <text x="360" y="130" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27" text-anchor="end">15 Mar 2025, 09:42 AM</text>

  <line x1="30" y1="142" x2="370" y2="142" stroke="#E5E0D4" stroke-width="0.5"/>

  <!-- Route section -->
  <text x="40" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">TRIP ROUTE</text>

  <!-- Pickup dot and label -->
  <circle cx="48" cy="176" r="5" fill="#22C55E"/>
  <text x="62" y="180" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Connaught Place, New Delhi</text>
  <!-- Route line -->
  <line x1="48" y1="181" x2="48" y2="201" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Dropoff dot and label -->
  <circle cx="48" cy="206" r="5" fill="#EF4444"/>
  <text x="62" y="210" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Indira Gandhi Intl Airport, T3</text>

  <!-- Trip stats -->
  <rect x="30" y="222" width="340" height="28" rx="2" fill="#F3F4F6"/>
  <text x="80" y="240" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">DISTANCE</text>
  <text x="80" y="252" font-family="'Arial', sans-serif" font-size="10" font-weight="700" fill="#2C2A27" text-anchor="middle">17.3 km</text>
  <line x1="130" y1="226" x2="130" y2="246" stroke="#E5E7EB" stroke-width="1"/>
  <text x="200" y="240" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">DURATION</text>
  <text x="200" y="252" font-family="'Arial', sans-serif" font-size="10" font-weight="700" fill="#2C2A27" text-anchor="middle">34 min</text>
  <line x1="270" y1="226" x2="270" y2="246" stroke="#E5E7EB" stroke-width="1"/>
  <text x="330" y="240" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">VEHICLE</text>
  <text x="330" y="252" font-family="'Arial', sans-serif" font-size="10" font-weight="700" fill="#2C2A27" text-anchor="middle">UberGo</text>

  <line x1="30" y1="262" x2="370" y2="262" stroke="#E5E0D4" stroke-width="0.5"/>

  <!-- Fare breakdown -->
  <text x="40" y="278" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" letter-spacing="1">FARE BREAKDOWN</text>
  <line x1="30" y1="284" x2="370" y2="284" stroke="#E5E0D4" stroke-width="0.5"/>

  <text x="40" y="301" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Base Fare</text>
  <text x="360" y="301" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  50.00</text>

  <text x="40" y="319" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Distance Charge (17.3 km × ₹14)</text>
  <text x="360" y="319" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹ 242.20</text>

  <text x="40" y="337" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Time Charge (34 min × ₹1.50)</text>
  <text x="360" y="337" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  51.00</text>

  <text x="40" y="355" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Toll &amp; Surcharges</text>
  <text x="360" y="355" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  60.00</text>

  <text x="40" y="373" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Platform Fee</text>
  <text x="360" y="373" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹   5.00</text>

  <line x1="30" y1="383" x2="370" y2="383" stroke="#E5E0D4" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="260" y="398" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Subtotal</text>
  <text x="360" y="398" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹ 408.20</text>

  <text x="260" y="414" font-family="'Arial', sans-serif" font-size="10" fill="#666660">GST (5%)</text>
  <text x="360" y="414" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  20.41</text>

  <line x1="240" y1="422" x2="370" y2="422" stroke="#1C1C1C" stroke-width="1"/>

  <rect x="240" y="427" width="130" height="26" rx="2" fill="#F59E0B" opacity="0.15"/>
  <text x="252" y="445" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#92400E">TOTAL PAID</text>
  <text x="358" y="445" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#92400E" text-anchor="end">₹ 428.61</text>

  <text x="40" y="444" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="458" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Uber Cash + HDFC Card •••• 8820</text>

  <line x1="30" y1="468" x2="370" y2="468" stroke="#E5E0D4" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Driver info -->
  <text x="40" y="484" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">DRIVER</text>
  <text x="40" y="497" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Suresh M.  •  ★ 4.87  •  DL7CA 0049</text>

  <text x="200" y="515" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Uber India Systems Pvt Ltd • help.uber.com</text>
  <text x="200" y="528" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">For support: support@uber.com  |  GSTIN: 27AABCU9099R1ZM</text>
  <text x="200" y="541" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">This is an auto-generated receipt.</text>
</svg>

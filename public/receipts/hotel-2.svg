  <text x="40" y="133" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#2C2A27">HLT-LHR-2025-C74832</text>
  <text x="360" y="133" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end">VAT INVOICE</text>


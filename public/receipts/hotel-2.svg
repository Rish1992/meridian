<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Receipt paper background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F8F6F2" filter="url(#paper-shadow)"/>
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#EAE6DD" opacity="0.15"/>

  <!-- Header strip - deep blue for hotel -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#1E3A5F"/>
  <rect x="20" y="50" width="360" height="32" fill="#1E3A5F"/>

  <!-- Hotel icon: building shape -->
  <rect x="38" y="22" width="28" height="38" rx="1" fill="none" stroke="#7FB3D3" stroke-width="1.5"/>
  <rect x="43" y="28" width="5" height="5" fill="#7FB3D3"/>
  <rect x="52" y="28" width="5" height="5" fill="#7FB3D3"/>
  <rect x="43" y="38" width="5" height="5" fill="#7FB3D3"/>
  <rect x="52" y="38" width="5" height="5" fill="#7FB3D3"/>
  <rect x="46" y="48" width="8" height="12" fill="#7FB3D3"/>

  <!-- Header text -->
  <text x="78" y="34" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">HOTEL RECEIPT</text>
  <text x="78" y="52" font-family="'Arial', sans-serif" font-size="10" fill="#7FB3D3" letter-spacing="1">ACCOMMODATION</text>
  <text x="200" y="76" font-family="'Georgia', serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Hilton London Heathrow</text>


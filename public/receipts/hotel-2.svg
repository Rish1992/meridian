  <text x="40" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Priya Sharma</text>
  <text x="240" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">ROOM NO.</text>
  <text x="240" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">312 — Executive Twin</text>

  <text x="40" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-IN</text>
  <text x="40" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">08 Feb 2025</text>
  <text x="160" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-OUT</text>
  <text x="160" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">11 Feb 2025</text>
  <text x="300" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">NIGHTS</text>
  <text x="300" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">3</text>

  <line x1="30" y1="218" x2="370" y2="218" stroke="#D1C9BC" stroke-width="0.5"/>


  <!-- Line items -->
  <text x="40" y="258" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Room Rate — Executive Twin (3 nts)</text>
  <text x="360" y="258" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£ 447.00</text>

  <text x="40" y="276" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Club Lounge Access</text>
  <text x="360" y="276" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£  45.00</text>

  <text x="40" y="294" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Heathrow Express (return)</text>
  <text x="360" y="294" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£  37.50</text>

  <text x="40" y="312" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Room Service (3 occasions)</text>
  <text x="360" y="312" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£  68.40</text>

  <text x="40" y="330" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Spa Treatment</text>
  <text x="360" y="330" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£  85.00</text>

  <line x1="30" y1="342" x2="370" y2="342" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="260" y="358" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Subtotal</text>
  <text x="360" y="358" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">£ 682.90</text>

  <text x="260" y="374" font-family="'Arial', sans-serif" font-size="10" fill="#666660">VAT (20%)</text>
  <text x="360" y="374" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">£ 136.58</text>

  <text x="260" y="390" font-family="'Arial', sans-serif" font-size="10" fill="#666660">City Tax (£4/night)</text>
  <text x="360" y="390" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">£  12.00</text>

  <line x1="240" y1="398" x2="370" y2="398" stroke="#1E3A5F" stroke-width="1"/>

  <rect x="240" y="403" width="130" height="26" rx="2" fill="#1E3A5F" opacity="0.08"/>
  <text x="252" y="421" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#1E3A5F">TOTAL PAID</text>
  <text x="358" y="421" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#1E3A5F" text-anchor="end">£ 831.48</text>

  <text x="40" y="420" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="434" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Visa Corporate •••• 7731</text>

  <line x1="30" y1="445" x2="370" y2="445" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="200" y="462" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Hilton London Heathrow, Terminal 4, Heathrow Airport, TW6 3AF</text>
  <text x="200" y="476" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">VAT No: GB 238 5567 90  |  Tel: +44 20 8759 7755</text>
  <text x="200" y="490" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">This is a computer-generated receipt and does not require a signature.</text>


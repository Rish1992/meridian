<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Receipt paper background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F9F7F4" filter="url(#paper-shadow)"/>
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#EDE8E0" opacity="0.18"/>

  <!-- Header strip - navy for Marriott -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#1B2A4A"/>
  <rect x="20" y="50" width="360" height="32" fill="#1B2A4A"/>

  <!-- Hotel icon: building shape -->
  <rect x="38" y="22" width="28" height="38" rx="1" fill="none" stroke="#A8C4E0" stroke-width="1.5"/>
  <rect x="43" y="28" width="5" height="5" fill="#A8C4E0"/>
  <rect x="52" y="28" width="5" height="5" fill="#A8C4E0"/>
  <rect x="43" y="38" width="5" height="5" fill="#A8C4E0"/>
  <rect x="52" y="38" width="5" height="5" fill="#A8C4E0"/>
  <rect x="46" y="48" width="8" height="12" fill="#A8C4E0"/>

  <!-- Header text -->
  <text x="78" y="34" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">HOTEL RECEIPT</text>
  <text x="78" y="52" font-family="'Arial', sans-serif" font-size="10" fill="#A8C4E0" letter-spacing="1">ACCOMMODATION — MARRIOTT HOTELS</text>

  <!-- Hotel brand name -->
  <text x="200" y="76" font-family="'Georgia', serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Marriott Heathrow</text>

  <!-- Divider -->
  <line x1="30" y1="98" x2="370" y2="98" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Booking reference -->
  <text x="40" y="118" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">RECEIPT NUMBER</text>
  <text x="40" y="133" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#2C2A27">MHR-20251005-0842</text>
  <text x="360" y="133" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end">VAT INVOICE</text>

  <line x1="30" y1="143" x2="370" y2="143" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Guest info -->
  <text x="40" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">GUEST NAME</text>
  <text x="40" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Corporate Guest</text>
  <text x="240" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">ROOM TYPE</text>
  <text x="240" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Standard King</text>

  <text x="40" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-IN</text>
  <text x="40" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">05 Oct 2025</text>
  <text x="160" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-OUT</text>
  <text x="160" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">06 Oct 2025</text>
  <text x="300" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">NIGHTS</text>
  <text x="300" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">1</text>

  <line x1="30" y1="218" x2="370" y2="218" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Line items header -->
  <text x="40" y="234" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" letter-spacing="1">DESCRIPTION</text>
  <text x="360" y="234" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" text-anchor="end" letter-spacing="1">AMOUNT (GBP)</text>

  <line x1="30" y1="240" x2="370" y2="240" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Line items — total must equal £189.00 -->
  <text x="40" y="258" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Room Charge — Standard King (1 nt)</text>
  <text x="360" y="258" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£ 157.50</text>

  <text x="40" y="276" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">VAT (20%)</text>
  <text x="360" y="276" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">£  31.50</text>

  <line x1="30" y1="290" x2="370" y2="290" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Total -->
  <line x1="240" y1="310" x2="370" y2="310" stroke="#1B2A4A" stroke-width="1"/>
  <rect x="240" y="315" width="130" height="26" rx="2" fill="#1B2A4A" opacity="0.08"/>
  <text x="252" y="333" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#1B2A4A">TOTAL PAID</text>
  <text x="358" y="333" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#1B2A4A" text-anchor="end">£ 189.00</text>

  <!-- Currency note -->
  <text x="40" y="332" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CURRENCY</text>
  <text x="40" y="346" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">GBP — British Pound Sterling</text>

  <!-- Payment method -->
  <text x="40" y="368" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="382" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Corporate Card •••• 4291</text>

  <line x1="30" y1="396" x2="370" y2="396" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Property details -->
  <text x="40" y="416" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PROPERTY ADDRESS</text>
  <text x="40" y="430" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Bath Road, Heathrow Airport, Hounslow TW6 2AQ</text>
  <text x="40" y="445" font-family="'Arial', sans-serif" font-size="9" fill="#888880">Tel: +44 20 8990 1100  |  VAT No: GB 865 3428 91</text>
  <text x="40" y="459" font-family="'Arial', sans-serif" font-size="9" fill="#888880">Marriott International Inc.</text>

  <line x1="30" y1="470" x2="370" y2="470" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="200" y="487" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Marriott Heathrow — London, United Kingdom</text>
  <text x="200" y="500" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">www.marriott.com  |  Bonvoy Member Services: 0800 221 222</text>
  <text x="200" y="513" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">This is a computer-generated receipt and does not require a signature.</text>

  <!-- Barcode stand-in -->
  <rect x="156" y="526" width="4" height="18" fill="#CCCCCC"/>
  <rect x="162" y="526" width="2" height="18" fill="#CCCCCC"/>
  <rect x="166" y="526" width="6" height="18" fill="#CCCCCC"/>
  <rect x="174" y="526" width="3" height="18" fill="#CCCCCC"/>
  <rect x="179" y="526" width="5" height="18" fill="#CCCCCC"/>
  <rect x="186" y="526" width="2" height="18" fill="#CCCCCC"/>
  <rect x="190" y="526" width="7" height="18" fill="#CCCCCC"/>
  <rect x="199" y="526" width="3" height="18" fill="#CCCCCC"/>
  <rect x="204" y="526" width="4" height="18" fill="#CCCCCC"/>
  <rect x="210" y="526" width="6" height="18" fill="#CCCCCC"/>
  <rect x="218" y="526" width="2" height="18" fill="#CCCCCC"/>
  <rect x="222" y="526" width="5" height="18" fill="#CCCCCC"/>
  <rect x="229" y="526" width="3" height="18" fill="#CCCCCC"/>
  <rect x="234" y="526" width="6" height="18" fill="#CCCCCC"/>
  <rect x="242" y="526" width="2" height="18" fill="#CCCCCC"/>
</svg>

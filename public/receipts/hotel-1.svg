<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- Subtle paper texture noise -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Receipt paper background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F9F7F4" filter="url(#paper-shadow)"/>

  <!-- Subtle paper tint overlay -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#EDE8E0" opacity="0.18"/>

  <!-- Header strip - blue for hotel -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#1E40AF"/>
  <rect x="20" y="50" width="360" height="32" fill="#1E40AF"/>

  <!-- Hotel icon: building shape -->
  <rect x="38" y="22" width="28" height="38" rx="1" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="43" y="28" width="5" height="5" fill="#93C5FD"/>
  <rect x="52" y="28" width="5" height="5" fill="#93C5FD"/>
  <rect x="43" y="38" width="5" height="5" fill="#93C5FD"/>
  <rect x="52" y="38" width="5" height="5" fill="#93C5FD"/>
  <rect x="46" y="48" width="8" height="12" fill="#93C5FD"/>

  <!-- Header text -->
  <text x="78" y="34" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">HOTEL RECEIPT</text>
  <text x="78" y="52" font-family="'Arial', sans-serif" font-size="10" fill="#93C5FD" letter-spacing="1">ACCOMMODATION</text>

  <!-- Hotel brand name -->
  <text x="200" y="76" font-family="'Georgia', serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Grand Hyatt New Delhi</text>

  <!-- Divider - receipt cut line style -->
  <line x1="30" y1="98" x2="370" y2="98" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Booking reference -->
  <text x="40" y="118" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">BOOKING REFERENCE</text>
  <text x="40" y="133" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#2C2A27">HYT-2024-NDL-88421</text>
  <text x="360" y="133" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end">TAX INVOICE</text>

  <line x1="30" y1="143" x2="370" y2="143" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Guest info -->
  <text x="40" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">GUEST NAME</text>
  <text x="40" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Rajesh Kumar</text>
  <text x="240" y="160" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">ROOM NO.</text>
  <text x="240" y="174" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">714 — Deluxe King</text>

  <text x="40" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-IN</text>
  <text x="40" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">14 Mar 2025</text>
  <text x="160" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CHECK-OUT</text>
  <text x="160" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">16 Mar 2025</text>
  <text x="300" y="193" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">NIGHTS</text>
  <text x="300" y="207" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">2</text>

  <line x1="30" y1="218" x2="370" y2="218" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Line items header -->
  <text x="40" y="234" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" letter-spacing="1">DESCRIPTION</text>
  <text x="360" y="234" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" text-anchor="end" letter-spacing="1">AMOUNT</text>

  <line x1="30" y1="240" x2="370" y2="240" stroke="#D1C9BC" stroke-width="0.5"/>

  <!-- Line items -->
  <text x="40" y="258" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Room Charge — Deluxe King (2 nts)</text>
  <text x="360" y="258" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹ 16,200</text>

  <text x="40" y="276" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Breakfast (2 pax × 2 days)</text>
  <text x="360" y="276" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  2,800</text>

  <text x="40" y="294" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Airport Transfer</text>
  <text x="360" y="294" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  1,400</text>

  <text x="40" y="312" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Minibar Charges</text>
  <text x="360" y="312" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    620</text>

  <text x="40" y="330" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Laundry Service</text>
  <text x="360" y="330" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    380</text>

  <line x1="30" y1="342" x2="370" y2="342" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Subtotal / tax / total -->
  <text x="260" y="358" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Subtotal</text>
  <text x="360" y="358" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹ 21,400</text>

  <text x="260" y="374" font-family="'Arial', sans-serif" font-size="10" fill="#666660">GST (18%)</text>
  <text x="360" y="374" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  3,852</text>

  <text x="260" y="390" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Service Charge (5%)</text>
  <text x="360" y="390" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  1,070</text>

  <line x1="240" y1="398" x2="370" y2="398" stroke="#1E40AF" stroke-width="1"/>

  <!-- Total -->
  <rect x="240" y="403" width="130" height="26" rx="2" fill="#1E40AF" opacity="0.08"/>
  <text x="252" y="421" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#1E40AF">TOTAL PAID</text>
  <text x="358" y="421" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#1E40AF" text-anchor="end">₹ 26,322</text>

  <!-- Payment method -->
  <text x="40" y="420" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="434" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Corporate Card •••• 4291</text>

  <line x1="30" y1="445" x2="370" y2="445" stroke="#D1C9BC" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="200" y="462" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Grand Hyatt New Delhi, Vasant Vihar, New Delhi 110 057</text>
  <text x="200" y="476" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">GSTIN: 07AABCH0271F1ZC  |  Tel: +91 11 2679 1234</text>
  <text x="200" y="490" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">This is a computer-generated receipt and does not require a signature.</text>

  <!-- Barcode stand-in -->
  <rect x="156" y="503" width="4" height="22" fill="#CCCCCC"/>
  <rect x="162" y="503" width="2" height="22" fill="#CCCCCC"/>
  <rect x="166" y="503" width="6" height="22" fill="#CCCCCC"/>
  <rect x="174" y="503" width="3" height="22" fill="#CCCCCC"/>
  <rect x="179" y="503" width="5" height="22" fill="#CCCCCC"/>
  <rect x="186" y="503" width="2" height="22" fill="#CCCCCC"/>
  <rect x="190" y="503" width="7" height="22" fill="#CCCCCC"/>
  <rect x="199" y="503" width="3" height="22" fill="#CCCCCC"/>
  <rect x="204" y="503" width="4" height="22" fill="#CCCCCC"/>
  <rect x="210" y="503" width="6" height="22" fill="#CCCCCC"/>
  <rect x="218" y="503" width="2" height="22" fill="#CCCCCC"/>
  <rect x="222" y="503" width="5" height="22" fill="#CCCCCC"/>
  <rect x="229" y="503" width="3" height="22" fill="#CCCCCC"/>
  <rect x="234" y="503" width="6" height="22" fill="#CCCCCC"/>
  <rect x="242" y="503" width="2" height="22" fill="#CCCCCC"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- Perforated edge simulation -->
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#DDD8C8"/>
    </pattern>
  </defs>

  <!-- Boarding pass background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F8F7F3" filter="url(#paper-shadow)"/>
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#EBE5D8" opacity="0.16"/>

  <!-- Header strip - indigo/purple for flight -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#4C1D95"/>
  <rect x="20" y="50" width="360" height="32" fill="#4C1D95"/>

  <!-- Plane icon -->
  <g transform="translate(36, 24)">
    <path d="M 8 28 L 8 18 L 2 12 L 2 8 L 8 10 L 8 4 C 8 2 10 0 12 0 C 14 0 16 2 16 4 L 16 10 L 22 8 L 22 12 L 16 18 L 16 28 L 12 26 Z" fill="#DDD6FE" transform="rotate(-45, 12, 14)"/>
  </g>

  <!-- Header text -->
  <text x="82" y="32" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">BOARDING PASS</text>
  <text x="82" y="51" font-family="'Arial', sans-serif" font-size="10" fill="#DDD6FE" letter-spacing="1">VISTARA — FLIGHT RECEIPT</text>
  <text x="200" y="74" font-family="'Arial', sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" letter-spacing="0.5">Fly Higher with Tata SIA Airlines</text>

  <!-- Departure and Arrival row -->
  <text x="70" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="200" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">TO</text>
  <text x="330" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">DATE</text>

  <text x="70" y="122" font-family="'Arial', sans-serif" font-size="26" font-weight="800" fill="#4C1D95" text-anchor="middle" letter-spacing="2">DEL</text>
  <!-- Plane arrow between -->
  <line x1="110" y1="114" x2="152" y2="114" stroke="#9CA3AF" stroke-width="1"/>
  <polygon points="152,110 162,114 152,118" fill="#9CA3AF"/>
  <text x="136" y="109" font-family="'Arial', sans-serif" font-size="7" fill="#9CA3AF" text-anchor="middle">1h 55m</text>
  <text x="200" y="122" font-family="'Arial', sans-serif" font-size="26" font-weight="800" fill="#4C1D95" text-anchor="middle" letter-spacing="2">BOM</text>
  <text x="330" y="118" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#2C2A27" text-anchor="middle">12 Mar 2025</text>

  <text x="70" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">New Delhi</text>
  <text x="200" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">Mumbai</text>
  <text x="330" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">Wednesday</text>


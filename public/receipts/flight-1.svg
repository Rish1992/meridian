  <text x="40" y="252" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#2C2A27">06:45</text>

  <text x="150" y="238" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">ARRIVES</text>
  <text x="150" y="252" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#2C2A27">08:40</text>

  <text x="270" y="238" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">BOARDING</text>
  <text x="270" y="252" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#EF4444">06:15</text>

  <text x="40" y="270" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PNR / BOOKING REF</text>
  <text x="40" y="284" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#2C2A27" letter-spacing="3">XKPL7R</text>
  <text x="360" y="284" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end">E-Ticket: 098 2847561930</text>


<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <filter id="paper-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- Perforated edge simulation -->
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#DDD8C8"/>
    </pattern>
  </defs>

  <!-- Boarding pass background -->
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#F8F7F3" filter="url(#paper-shadow)"/>
  <rect x="20" y="10" width="360" height="540" rx="3" ry="3" fill="#EBE5D8" opacity="0.16"/>

  <!-- Header strip - Air India burgundy/red -->
  <rect x="20" y="10" width="360" height="72" rx="3" ry="3" fill="#8B0000"/>
  <rect x="20" y="50" width="360" height="32" fill="#8B0000"/>

  <!-- Air India logo circle -->
  <circle cx="50" cy="38" r="18" fill="#FF6B35" opacity="0.3"/>
  <circle cx="50" cy="38" r="12" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <text x="50" y="34" font-family="'Arial', sans-serif" font-size="7" font-weight="700" fill="#FFD700" text-anchor="middle">AIR</text>
  <text x="50" y="44" font-family="'Arial', sans-serif" font-size="7" font-weight="700" fill="#FFD700" text-anchor="middle">INDIA</text>

  <!-- Header text -->
  <text x="82" y="32" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">FLIGHT RECEIPT</text>
  <text x="82" y="51" font-family="'Arial', sans-serif" font-size="10" fill="#FFD700" letter-spacing="1">AIR INDIA — E-TICKET ITINERARY</text>
  <text x="200" y="74" font-family="'Arial', sans-serif" font-size="10" fill="#FFC0CB" text-anchor="middle" letter-spacing="0.5">Maharaja's way — Fly with Pride</text>

  <!-- Departure and Arrival row -->
  <text x="70" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="200" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">TO</text>
  <text x="330" y="103" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle" letter-spacing="1">DATE</text>

  <text x="70" y="122" font-family="'Arial', sans-serif" font-size="26" font-weight="800" fill="#8B0000" text-anchor="middle" letter-spacing="2">DEL</text>
  <!-- Arrow between -->
  <line x1="110" y1="114" x2="152" y2="114" stroke="#9CA3AF" stroke-width="1"/>
  <polygon points="152,110 162,114 152,118" fill="#9CA3AF"/>
  <text x="136" y="109" font-family="'Arial', sans-serif" font-size="7" fill="#9CA3AF" text-anchor="middle">2h 05m</text>
  <text x="200" y="122" font-family="'Arial', sans-serif" font-size="26" font-weight="800" fill="#8B0000" text-anchor="middle" letter-spacing="2">BOM</text>
  <text x="330" y="118" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#2C2A27" text-anchor="middle">14 Nov 2025</text>

  <text x="70" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">New Delhi</text>
  <text x="200" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">Mumbai</text>
  <text x="330" y="136" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="middle">Friday</text>

  <!-- Perforated divider -->
  <line x1="30" y1="152" x2="370" y2="152" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="20" cy="152" r="8" fill="#F0EDE4"/>
  <circle cx="380" cy="152" r="8" fill="#F0EDE4"/>

  <!-- Passenger + flight info -->
  <text x="40" y="172" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PASSENGER NAME</text>
  <text x="40" y="186" font-family="'Arial', sans-serif" font-size="12" font-weight="700" fill="#2C2A27">CORPORATE TRAVELLER</text>

  <text x="260" y="172" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">FLIGHT</text>
  <text x="260" y="186" font-family="'Arial', sans-serif" font-size="12" font-weight="700" fill="#8B0000">AI-441</text>

  <text x="40" y="205" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CARRIER</text>
  <text x="40" y="219" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Air India</text>

  <text x="150" y="205" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">CLASS</text>
  <text x="150" y="219" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Economy</text>

  <text x="270" y="205" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">ORIGIN</text>
  <text x="270" y="219" font-family="'Arial', sans-serif" font-size="12" font-weight="700" fill="#2C2A27">DEL</text>

  <text x="40" y="238" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">TRAVEL DATE</text>
  <text x="40" y="252" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#2C2A27">14 Nov 2025</text>

  <text x="180" y="238" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">DESTINATION</text>
  <text x="180" y="252" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#2C2A27">BOM</text>

  <text x="40" y="270" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">BOOKING REFERENCE</text>
  <text x="40" y="284" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#2C2A27" letter-spacing="3">AIBLR8X</text>
  <text x="360" y="284" font-family="'Arial', sans-serif" font-size="9" fill="#888880" text-anchor="end">E-Ticket: 098 6340217855</text>

  <!-- Second perforated divider -->
  <line x1="30" y1="296" x2="370" y2="296" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="20" cy="296" r="8" fill="#F0EDE4"/>
  <circle cx="380" cy="296" r="8" fill="#F0EDE4"/>


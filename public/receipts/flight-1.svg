  <text x="40" y="315" font-family="'Arial', sans-serif" font-size="9" font-weight="700" fill="#888880" letter-spacing="1">FARE BREAKDOWN</text>
  <line x1="30" y1="321" x2="370" y2="321" stroke="#DDD8C8" stroke-width="0.5"/>

  <text x="40" y="338" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Base Fare — Economy (1 pax)</text>
  <text x="360" y="338" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  4,200</text>

  <text x="40" y="355" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Fuel Surcharge</text>
  <text x="360" y="355" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    850</text>

  <text x="40" y="372" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Airport Development Fee</text>
  <text x="360" y="372" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    320</text>

  <text x="40" y="389" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Passenger Service Fee</text>
  <text x="360" y="389" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    680</text>

  <text x="40" y="406" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">GST (5%)</text>
  <text x="360" y="406" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    400</text>

  <line x1="30" y1="416" x2="370" y2="416" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="260" y="431" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Subtotal</text>
  <text x="360" y="431" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  6,450</text>

  <line x1="240" y1="441" x2="370" y2="441" stroke="#8B0000" stroke-width="1"/>

  <rect x="240" y="446" width="130" height="26" rx="2" fill="#8B0000" opacity="0.1"/>
  <text x="252" y="464" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#8B0000">TICKET AMOUNT</text>
  <text x="358" y="464" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#8B0000" text-anchor="end">₹  6,450</text>

  <text x="40" y="463" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="477" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Corporate Card •••• 3318</text>

  <line x1="30" y1="488" x2="370" y2="488" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="200" y="504" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Air India Limited  |  GSTIN: 07AABCA0321A1ZC</text>
  <text x="200" y="517" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">www.airindia.com  |  1860 233 1407  |  E-Ticket is valid photo ID</text>
  <text x="200" y="530" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Airline: Air India  |  Flight: AI-441  |  Route: DEL → BOM</text>
  <text x="200" y="543" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Booking Ref: AIBLR8X  |  Travel Date: 14 November 2025</text>
</svg>

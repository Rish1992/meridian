  <text x="40" y="338" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Base Fare — Economy (1 pax)</text>
  <text x="360" y="338" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹  3,499</text>

  <text x="40" y="355" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Fuel Surcharge</text>
  <text x="360" y="355" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    890</text>

  <text x="40" y="372" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Airport Development Fee</text>
  <text x="360" y="372" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    480</text>

  <text x="40" y="389" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Passenger Service Fee</text>
  <text x="360" y="389" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    280</text>

  <text x="40" y="406" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Seat Selection (22A)</text>
  <text x="360" y="406" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    350</text>

  <text x="40" y="423" font-family="'Arial', sans-serif" font-size="11" fill="#2C2A27">Convenience Fee</text>
  <text x="360" y="423" font-family="'Courier New', monospace" font-size="11" fill="#2C2A27" text-anchor="end">₹    199</text>

  <line x1="30" y1="433" x2="370" y2="433" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="260" y="448" font-family="'Arial', sans-serif" font-size="10" fill="#666660">Subtotal</text>
  <text x="360" y="448" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  5,698</text>

  <text x="260" y="463" font-family="'Arial', sans-serif" font-size="10" fill="#666660">GST (18%)</text>
  <text x="360" y="463" font-family="'Courier New', monospace" font-size="10" fill="#666660" text-anchor="end">₹  1,026</text>

  <line x1="240" y1="471" x2="370" y2="471" stroke="#4C1D95" stroke-width="1"/>

  <rect x="240" y="476" width="130" height="26" rx="2" fill="#4C1D95" opacity="0.1"/>
  <text x="252" y="494" font-family="'Arial', sans-serif" font-size="11" font-weight="700" fill="#4C1D95">TOTAL PAID</text>
  <text x="358" y="494" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#4C1D95" text-anchor="end">₹  6,724</text>

  <text x="40" y="493" font-family="'Arial', sans-serif" font-size="9" fill="#888880" letter-spacing="1">PAYMENT METHOD</text>
  <text x="40" y="507" font-family="'Arial', sans-serif" font-size="10" fill="#2C2A27">Axis Corporate Card •••• 6647</text>

  <line x1="30" y1="517" x2="370" y2="517" stroke="#DDD8C8" stroke-width="0.5" stroke-dasharray="4,3"/>

  <text x="200" y="532" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">Tata SIA Airlines Ltd (Vistara)  |  GSTIN: 07AAKCT3090D1Z9</text>
  <text x="200" y="545" font-family="'Arial', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">www.airvistara.com  |  1860 108 8888  |  E-Ticket is valid ID proof</text>
</svg>
